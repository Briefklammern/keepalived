global_defs {
    script_user root
    enable_script_security
}

vrrp_script {
    script "/home/script.sh"
    interval 3
    fall 1
    rise 2
}

vrrp_instance VI_1 {
    state MASTER
    interface enp0s3
    virtual_router_id 15
    priority 255
    advert_int 1

    virtual_ipaddress {
        192.168.1.50/24
    }
    track_script {
        check_script
    }
}
